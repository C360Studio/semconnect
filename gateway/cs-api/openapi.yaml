        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: ControlStreamCollection.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/ControlStreamCollection"}
        "400": {$ref: "#/components/responses/BadRequest"}
        "406": {$ref: "#/components/responses/NotAcceptable"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}

  # ============================================================
  # Deferred to follow-up stages — vendored from upstream OGC OAS
  # for roadmap visibility. 501 today.
  # ============================================================
  /commands:
    x-not-implemented-at-v01: true
    x-cs-upstream-source: api/upstream/part2/paths/commands.yaml
    get:
      tags: [NotImplementedAtV01]
      summary: List Commands (not implemented at v0.1).
      description: Stub. See `x-cs-upstream-source`.
      responses:
        "501": {$ref: "#/components/responses/NotImplemented"}

  /systemEvents:
    x-cs-upstream-source: api/upstream/part2/paths/systemEvents.yaml
    get:
      operationId: getSystemEvents
      tags: [SystemEvents]
      summary: List system events.
      description: Stage 25 — JSON SystemEvent collection.
      parameters:
