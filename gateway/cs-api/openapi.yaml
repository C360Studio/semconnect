  # Procedures (CS API §6) — Stage 20
  # ============================================================
  /procedures:
    get:
      operationId: getProcedures
      summary: List procedures.
      description: |-
        Returns a `ProcedureCollection`. JSON-only at v0.1. Stage 20
        — closes the OpenSensorHub bar's `conf/procedure` class.
      tags: [Procedures]
      parameters:
        - $ref: "#/components/parameters/F"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: ProcedureCollection (JSON) or FeatureCollection (geo+json).
          content:
            application/json:
              schema: {$ref: "#/components/schemas/ProcedureCollection"}
            application/geo+json:
              schema:
                type: object
                description: |-
                  RFC 7946 FeatureCollection. Every Feature carries
                  `geometry: null` (literal JSON null) per CS API §6
                  `/req/procedure/location` — procedures MUST NOT
                  carry location data. Each Feature's `properties`
                  includes `featureType: "Procedure"`. Stage 20.1.
        "400": {$ref: "#/components/responses/BadRequest"}
        "406": {$ref: "#/components/responses/NotAcceptable"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
    head:
      operationId: headProcedures
      tags: [Procedures]
      responses:
        "200": {description: OK (no body)}
    post:
      operationId: createProcedure
      summary: Create a procedure (CS API §6.6).
      description: |-
        Accepts the same media types POST /systems does: SensorML
        (sml+json / sensorml+json) for full SOSA Procedure ↔
        SimpleProcess parity, or GeoJSON Feature shape
        (json / geo+json) for the ETS-style minimum body.
      tags: [Procedures]
      requestBody:
        required: true
        content:
          application/sml+json:
            schema: {type: object, description: SensorML SimpleProcess / AggregateProcess.}
          application/sensorml+json:
            schema: {type: object, description: Alias for application/sml+json.}
          application/json:
            schema: {$ref: "#/components/schemas/SystemFeature"}
          application/geo+json:
            schema: {$ref: "#/components/schemas/SystemFeature"}
      responses:
        "201":
          description: Created.
          headers:
            Location:
              schema: {type: string, format: uri-reference}
          content:
            application/json:
              schema:
                type: object
                required: [status, id, type]
                properties:
                  status: {type: string, enum: [created]}
                  id:    {type: string}
                  type:  {type: string, enum: [Procedure]}
        "400": {$ref: "#/components/responses/BadRequest"}
        "413": {$ref: "#/components/responses/PayloadTooLarge"}
        "415": {$ref: "#/components/responses/UnsupportedMediaType"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
    options:
      operationId: optionsProcedures
      tags: [Procedures]
      responses:
        "204":
          description: No Content.
          headers:
            Allow:
              schema: {type: string}
              description: '`GET, HEAD, POST, OPTIONS`'

