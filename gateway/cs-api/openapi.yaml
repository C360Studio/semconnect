    head:
      operationId: headSystemEvents
      tags: [SystemEvents]
      responses:
        "200": {description: OK (no body)}
    post:
      operationId: createSystemEvent
      tags: [SystemEvents]
      summary: Create a system event fixture.
      description: v0.1 fixture helper used by the conformance harness.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/SystemEventPost"}
      responses:
        "201":
          description: Created.
          headers:
            Location:
              schema: {type: string, format: uri-reference}
          content:
            application/json:
              schema:
                type: object
                required: [status, id, type]
                properties:
                  status: {type: string, enum: [created]}
                  id:    {type: string}
                  type:  {type: string, enum: [SystemEvent]}
        "400": {$ref: "#/components/responses/BadRequest"}
        "413": {$ref: "#/components/responses/PayloadTooLarge"}
        "415": {$ref: "#/components/responses/UnsupportedMediaType"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
    options:
      operationId: optionsSystemEvents
      tags: [SystemEvents]
