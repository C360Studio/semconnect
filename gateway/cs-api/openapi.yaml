      summary: Get a system event.
      responses:
        "200":
          description: SystemEvent JSON subset.
          headers:
            X-CS-Reconstructed-Lossy:
              $ref: "#/components/headers/CsReconstructedLossy"
          content:
            application/json:
              schema: {$ref: "#/components/schemas/SystemEvent"}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "406": {$ref: "#/components/responses/NotAcceptable"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
    head:
      operationId: headSystemEvent
      tags: [SystemEvents]
      responses:
        "200": {description: OK (no body)}
        "404": {description: Not Found}
    options:
      operationId: optionsSystemEvent
      tags: [SystemEvents]
      responses:
        "204":
          description: No Content.

  /systems/{id}/events:
    parameters:
      - $ref: "#/components/parameters/EntityID"
    get:
      operationId: getSystemScopedEvents
      tags: [SystemEvents]
      summary: List events for a system.
      description: Stage 25 — filters SystemEvents by stored system reference.
      parameters:
        - $ref: "#/components/parameters/F"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: SystemEventCollection.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/SystemEventCollection"}
        "400": {$ref: "#/components/responses/BadRequest"}
        "406": {$ref: "#/components/responses/NotAcceptable"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
    post:
      operationId: createSystemScopedEvent
      tags: [SystemEvents]
      summary: Create a system event for a system.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/SystemEventPost"}
      responses:
        "201":
          description: Created.
        "400": {$ref: "#/components/responses/BadRequest"}
        "413": {$ref: "#/components/responses/PayloadTooLarge"}
        "415": {$ref: "#/components/responses/UnsupportedMediaType"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}

  /systems/{id}/events/{eventID}:
    parameters:
      - $ref: "#/components/parameters/EntityID"
      - in: path
        name: eventID
        required: true
        schema: {type: string, pattern: '^[A-Za-z0-9_.:-]+$'}
    get:
      operationId: getSystemScopedEvent
      tags: [SystemEvents]
      summary: Get a system-scoped event.
      responses:
        "200":
          description: SystemEvent JSON subset.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/SystemEvent"}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "406": {$ref: "#/components/responses/NotAcceptable"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}

components:

  # --- Reusable parameters ---
  parameters:
    F:
      in: query
      name: f
      required: false
      schema:
        type: string
        enum: [json, geojson, sensorml, om, jsonld, yaml]
      description: |-
        OGC API Common Part 1 §7 short-name override for `Accept`.
        Maps to the same media types per-resource — see each path's
        `responses.content` for what's negotiable. `?f=` that doesn't
        map to the resource's supported set 406s rather than silently
        falling through to `Accept`.

    Limit:
      in: query
      name: limit
      required: false
      schema: {type: integer, minimum: 1}
      description: |-
        Page size. Defaulted and ceiling-capped per
        `cs-api.config.DefaultListLimit` / `MaxListLimit`. Out-of-range
        values 400.

    EntityID:
      in: path
      name: id
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9_.:-]+$'
      description: |-
        6-part SemStreams entity ID. NATS-token-safe characters only.

  # --- Reusable response shapes ---
  responses:
    BadRequest:
      description: Validation failure on a client-supplied value.
      content:
        application/json:
          schema: {$ref: "#/components/schemas/ErrorResponse"}
    NotFound:
      description: Entity not present (or present but wrong kind for this URL).
      content:
        application/json:
          schema: {$ref: "#/components/schemas/ErrorResponse"}
    NotAcceptable:
      description: |-
        No element of the family's negotiable set matches Accept (or
        `?f=` short-name). Body lists what the family supports.
      content:
        application/json:
          schema:
            type: object
            required: [error, supported]
            properties:
              error: {type: string, enum: ["not acceptable"]}
              supported:
                type: array
                items: {type: string}
    PayloadTooLarge:
      description: |-
        Request body exceeded the `MaxRequestBytes` middleware cap.
      content:
        application/json:
          schema: {$ref: "#/components/schemas/ErrorResponse"}
    UnsupportedMediaType:
      description: Content-Type not on the endpoint's accept set.
      headers:
        Accept-Post:
          schema: {type: string}
          description: Media types this endpoint accepts.
      content:
        application/json:
          schema: {$ref: "#/components/schemas/ErrorResponse"}
    ServiceUnavailable:
      description: |-
        Transient backend error — NATS unreachable, JetStream
        responder absent, request/reply timeout.
      content:
        application/json:
          schema: {$ref: "#/components/schemas/ErrorResponse"}
    NotImplemented:
      description: |-
        Endpoint is documented for spec-completeness but returns
        `501 Not Implemented` at v0.1. Path carries
        `x-not-implemented-at-v01: true` and an `x-cs-upstream-source`
        pointer.
      content:
        application/json:
          schema:
            type: object
            required: [error]
            properties:
              error: {type: string, enum: ["not implemented at v0.1"]}
              upstream_source: {type: string, format: uri-reference}

  # --- Reusable response headers ---
  headers:
    CsReconstructedLossy:
      description: |-
        `true` when the response body is reconstructed from triples and
        omits fields the framework's triple emitter does not preserve
        (inputs/outputs/parameters/keywords/connections/identifier
        metadata).
      schema: {type: boolean, enum: [true]}

  # --- Schemas ---
  schemas:

    LandingPage:
      type: object
      required: [links]
      properties:
        title:
          type: string
          description: Server title — operator-configured.
        description:
          type: string
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    ConformanceDeclaration:
      type: object
      required: [conformsTo]
      properties:
        conformsTo:
          type: array
          items:
            type: string
            format: uri
          description: |-
            URIs of the conformance classes this server claims to
            implement.

    Link:
      type: object
      required: [href, rel]
      properties:
        href:  {type: string, format: uri-reference}
        rel:   {type: string}
        type:  {type: string}
        title: {type: string}

    CollectionsDocument:
      type: object
      required: [collections, links]
      properties:
        collections:
          type: array
          items: {$ref: "#/components/schemas/CollectionMetadata"}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}
      description: |-
        Stage 28 OGC API Common Part 2 collections metadata. The
        `items` links target semconnect's canonical CS API resource
        collection endpoints rather than a `/collections/{id}/items`
        facade at v0.1.

    CollectionMetadata:
      type: object
      required: [id, title, itemType, links]
      properties:
        id:          {type: string}
        title:       {type: string}
        description: {type: string}
        itemType:
          type: string
          description: "`feature` for feature resources; direct SOSA/CS API resource type otherwise."
        featureType:
          type: string
          description: SOSA/SSN marker for feature collections such as `sosa:System`.
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    SystemCollection:
      type: object
      required: [type, numberMatched, numberReturned, items, links]
      properties:
        type:           {type: string, enum: [SystemCollection]}
        numberMatched:  {type: integer, minimum: 0}
        numberReturned: {type: integer, minimum: 0}
        truncated:      {type: boolean}
        items:
          type: array
          items: {$ref: "#/components/schemas/SystemRef"}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}
      description: |-
        Per CS API §7.13 / OGC API Common §7.14: array field is
        `items` (not `systems`). Stage 10 closed the spec gap.

    SystemRef:
      type: object
      required: [id, type]
      properties:
        id:    {type: string}
        type:  {type: string, enum: [System]}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    System:
      type: object
      required: [id, type, links]
      properties:
        id:          {type: string}
        type:        {type: string, enum: [System]}
        label:       {type: string}
        description: {type: string}
        definition:  {type: string, format: uri}
        uid:
          type: string
          description: |-
            Client-submitted identifier (SensorML `uniqueId` or
            Feature `properties.uid`) preserved via the framework
            `sensorml.process.uid` triple. Mirrors `uniqueId` +
            `properties.uid` on the same entity so SensorML, JSON,
            and Feature-shape clients each see the spelling they
            expect.
        uniqueId:
          type: string
          description: SensorML spelling of `uid`. Same value, same source triple.
        properties:
          type: object
          required: [uid]
          description: |-
            GeoJSON Feature-shape container. Surfaces the same `uid`
            via `properties.uid` so a client that POSTed a Feature
            body finds it on read-back where the spec puts it.
            `uid`, top-level `uid`, and top-level `uniqueId` are
            **jointly present or jointly absent** — the runtime
            sources all three from a single `sensorml.process.uid`
            triple so picking any spelling is safe without checking
            the other two.
          properties:
            uid: {type: string}
        geometry:
          type: object
          description: |-
            GeoJSON-shaped position recovered from the SensorML
            `position` field. Typically `{type: "Point", coordinates:
            [lon, lat, alt?]}`. Stored under the framework
            `sensorml.process.position` predicate. Absent when the
            source SensorML had no position.
        hosts:
          type: array
          items: {type: string}
        hostedBy:      {type: string}
        usedProcedure: {type: string}
        attachedTo:    {type: string}
        identifiers:   {type: array, items: {}}
        capabilities:  {type: array, items: {}}
        characteristics:
          type: array
          items: {}
          description: |-
            SensorML `characteristics` reverse-mapping. Renamed from
            `properties` at Stage 18 to free the `properties` JSON
            key for the Feature-shape container above — semantically
            distinct: SensorML characteristics are metadata
            descriptors, not GeoJSON Feature properties.
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}
      description: |-
        v0.1 JSON subset reconstructed from triples. Lossy fields
        documented via `X-CS-Reconstructed-Lossy: true`. Stage 14
        adds `geometry` via sister-side position-preservation
        workaround; Stage 18 adds `uid` / `uniqueId` /
        `properties.uid` via sister-side uid preservation.

    SystemFeature:
      type: object
      required: [type, properties]
      properties:
        type:     {type: string, enum: [Feature]}
        id:       {type: string, description: Optional client-supplied 6-part SemStreams ID. When absent, the server mints from `properties.uid`.}
        geometry: {type: object, nullable: true, description: GeoJSON geometry — stored on the entity for /areas spatial recovery.}
        properties:
          type: object
          required: [uid]
          properties:
            uid:         {type: string, description: SensorML uniqueId — feeds the 6-part entity ID mint.}
            name:        {type: string}
            description: {type: string}
      description: |-
        Stage 16 — CS API §7.6 GeoJSON Feature body for POST and PUT
        on /systems. Distinct from the read-side `System` resource:
        write-side accepts the spec's Feature shape; read-side
        returns the §7.2 JSON subset.

    ProcedureCollection:
      type: object
      required: [type, numberMatched, numberReturned, items, links]
      properties:
        type:           {type: string, enum: [ProcedureCollection]}
        numberMatched:  {type: integer, minimum: 0}
        numberReturned: {type: integer, minimum: 0}
        truncated:      {type: boolean}
        items:
          type: array
          items: {$ref: "#/components/schemas/ProcedureRef"}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    ProcedureRef:
      type: object
      required: [id, type]
      properties:
        id:    {type: string}
        type:  {type: string, enum: [Procedure]}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    Procedure:
      type: object
      required: [id, type, links]
      properties:
        id:          {type: string}
        type:        {type: string, enum: [Procedure]}
        label:       {type: string}
        description: {type: string}
        definition:  {type: string, format: uri}
        uid:         {type: string, description: Stage 18 uid preservation — same triple as /systems.}
        uniqueId:    {type: string, description: SensorML spelling of uid.}
        properties:
          type: object
          required: [uid]
          properties:
            uid: {type: string}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}
      description: |-
        v0.1 JSON subset reconstructed from triples. Lossy fields
        documented via `X-CS-Reconstructed-Lossy: true`. No
        `geometry` field — per `/req/procedure/location` procedures
        MUST NOT carry location.

    DeploymentCollection:
      type: object
      required: [type, numberMatched, numberReturned, items, links]
      properties:
        type:           {type: string, enum: [DeploymentCollection]}
        numberMatched:  {type: integer, minimum: 0}
        numberReturned: {type: integer, minimum: 0}
        truncated:      {type: boolean}
        items:
          type: array
          items: {$ref: "#/components/schemas/DeploymentRef"}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    DeploymentRef:
      type: object
      required: [id, type]
      properties:
        id:    {type: string}
        type:  {type: string, enum: [Deployment]}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    Deployment:
      type: object
      required: [id, type, links]
      properties:
        id:          {type: string}
        type:        {type: string, enum: [Deployment]}
        label:       {type: string}
        description: {type: string}
        uid:         {type: string}
        uniqueId:    {type: string}
        properties:
          type: object
          properties:
            uid:         {type: string}
            name:        {type: string}
            description: {type: string}
        geometry:
          type: object
          description: GeoJSON geometry — deploy site location, round-tripped via `sensorml.process.position`.
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}
      description: |-
        v0.1 JSON subset reconstructed from triples. Lossy fields
        documented via `X-CS-Reconstructed-Lossy: true`.

    SamplingFeatureCollection:
      type: object
      required: [type, numberMatched, numberReturned, items, links]
      properties:
        type:           {type: string, enum: [SamplingFeatureCollection]}
        numberMatched:  {type: integer, minimum: 0}
        numberReturned: {type: integer, minimum: 0}
        truncated:      {type: boolean}
        items:
          type: array
          items: {$ref: "#/components/schemas/SamplingFeatureRef"}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    SamplingFeatureRef:
      type: object
      required: [id, type]
      properties:
        id:    {type: string}
        type:  {type: string, enum: [SamplingFeature]}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    SamplingFeature:
      type: object
      required: [id, type, links]
      properties:
        id:          {type: string}
        type:        {type: string, enum: [SamplingFeature]}
        label:       {type: string}
        description: {type: string}
        uid:         {type: string}
        uniqueId:    {type: string}
        properties:
          type: object
          properties:
            uid:         {type: string}
            name:        {type: string}
            description: {type: string}
        geometry:
          type: object
          description: GeoJSON geometry for the sampled feature or site.
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}
      description: |-
        v0.1 JSON subset reconstructed from triples. Lossy fields
        documented via `X-CS-Reconstructed-Lossy: true`.

    PropertyCollection:
      type: object
      required: [type, numberMatched, numberReturned, items, links]
      properties:
        type:           {type: string, enum: [PropertyCollection]}
        numberMatched:  {type: integer, minimum: 0}
        numberReturned: {type: integer, minimum: 0}
        truncated:      {type: boolean}
        items:
          type: array
          items: {$ref: "#/components/schemas/PropertyRef"}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    PropertyRef:
      type: object
      required: [id, type]
      properties:
        id:    {type: string}
        type:  {type: string, enum: [Property]}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    Property:
      type: object
      required: [id, type, links]
      properties:
        id:           {type: string}
        type:         {type: string, enum: [Property]}
        label:        {type: string}
        description:  {type: string}
        definition:   {type: string, format: uri}
        baseProperty: {type: string, format: uri}
        uid:          {type: string}
        uniqueId:     {type: string}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}
      description: |-
        v0.1 JSON subset reconstructed from triples for a SOSA
        ObservableProperty / SensorML DerivedProperty. Lossy fields
        documented via `X-CS-Reconstructed-Lossy: true`.

    PropertyPost:
      type: object
      required: [uniqueId]
      properties:
        uniqueId:     {type: string}
        uid:          {type: string, description: Alias accepted when JSON clients do not use SensorML spelling.}
        label:        {type: string}
        name:         {type: string, description: Alias for label.}
        description:  {type: string}
        definition:   {type: string, format: uri}
        baseProperty: {type: string, format: uri}

    ControlStreamCollection:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: {$ref: "#/components/schemas/ControlStream"}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    ControlStream:
      type: object
      required: [id, name, system@link, inputName, controlledProperties, issueTime, executionTime, live, async, formats]
      properties:
        id:          {type: string}
        name:        {type: string}
        description: {type: string}
        system@id:   {type: string}
        system@link: {$ref: "#/components/schemas/Link"}
        inputName:   {type: string}
        controlledProperties:
          type: array
          items: {$ref: "#/components/schemas/ControlledProperty"}
        issueTime:     {nullable: true}
        executionTime: {nullable: true}
        live:          {type: boolean}
        async:         {type: boolean}
        formats:
          type: array
          items: {type: string}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    ControlledProperty:
      type: object
      properties:
        definition:  {type: string, format: uri}
        label:       {type: string}
        description: {type: string}

    CommandSchema:
      type: object
      required: [commandFormat, parametersSchema]
      properties:
        commandFormat: {type: string}
        parametersSchema:
          type: object
          additionalProperties: true

    ControlStreamPost:
      type: object
      required: [name, inputName, schema]
      properties:
        id:          {type: string, description: Optional client-supplied 6-part SemStreams ID.}
        name:        {type: string}
        description: {type: string}
        system@id:   {type: string}
        inputName:   {type: string}
        async:       {type: boolean}
        controlledProperties:
          type: array
          items: {$ref: "#/components/schemas/ControlledProperty"}
        schema: {$ref: "#/components/schemas/CommandSchema"}

    SystemEventCollection:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: {$ref: "#/components/schemas/SystemEvent"}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    SystemEvent:
      type: object
      required: [id, time, eventType]
      properties:
        id:          {type: string}
        time:        {type: string, format: date-time}
        eventTime:   {type: string, format: date-time}
        eventType:   {type: string}
        message:     {type: string}
        description: {type: string}
        system@id:   {type: string}
        system@link: {$ref: "#/components/schemas/Link"}
        systemUid:   {type: string}
        severity:    {type: string}
        source:      {type: string}
        keywords:
          type: array
          items: {type: string}
        payload:
          type: object
          additionalProperties: true
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    SystemEventPost:
      type: object
      required: [system@id]
      properties:
        id:          {type: string, description: Optional client-supplied 6-part SemStreams ID.}
        time:        {type: string, format: date-time}
        eventTime:   {type: string, format: date-time}
        eventType:   {type: string}
        message:     {type: string}
        description: {type: string}
        system@id:   {type: string}
        systemUid:   {type: string}
        severity:    {type: string}
        source:      {type: string}
        keywords:
          type: array
          items: {type: string}
        payload:
          type: object
          additionalProperties: true

    ItemsOnlyCollection:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: {}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    DatastreamCollection:
      type: object
      required: [type, numberMatched, numberReturned, items, links]
      properties:
        type:           {type: string, enum: [DatastreamCollection]}
        numberMatched:  {type: integer, minimum: 0}
        numberReturned: {type: integer, minimum: 0}
        truncated:      {type: boolean}
        items:
          type: array
          items: {$ref: "#/components/schemas/DatastreamRef"}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    DatastreamRef:
      type: object
      required: [id, type]
      properties:
        id:    {type: string}
        type:  {type: string, enum: [Datastream]}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    Datastream:
      type: object
      required: [id, type]
      properties:
        id:               {type: string}
        type:             {type: string, enum: [Datastream]}
        name:             {type: string}
        description:      {type: string}
        system:           {type: string, description: 6-part SemStreams system ID.}
        observedProperty: {type: string, format: uri}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    DatastreamCreate:
      type: object
      required: [name, system, observedProperty]
      properties:
        id:               {type: string, description: Optional client-supplied 6-part ID; minted otherwise.}
        name:             {type: string}
        description:      {type: string}
        system:           {type: string, description: 6-part SemStreams system ID (strict).}
        observedProperty: {type: string, format: uri}

    ObservationCollection:
      type: object
      required: [type, numberMatched, numberReturned, items, links]
      properties:
        type:           {type: string, enum: [ObservationCollection]}
        numberMatched:  {type: integer, minimum: 0}
        numberReturned: {type: integer, minimum: 0}
        truncated:      {type: boolean}
        items:
          type: array
          items: {$ref: "#/components/schemas/Observation"}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}
      description: |-
        `truncated` is a v0.1 heuristic — see
        `gateway/cs-api/observations_get.go` `observationCollection`
        doc comment for failure modes. Follow-up replaces with
        `consumer.Info().NumPending`.

    SWEObservationCollection:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              time: {type: string}
              result: {}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}
      description: |-
        Stage 27 SWE Common observation-value subset derived from
        stored OMS observations. Full schema-bound SWE records and
        binary layouts remain deferred; responses carry
        `X-CS-SWE-Subset: observation-values`.

    Observation:
      type: object
      required: [procedure, observedProperty, resultTime]
      properties:
        id:               {type: string}
        procedure:        {type: string, format: uri}
        observedProperty: {type: string, format: uri}
        featureOfInterest: {type: string}
        phenomenonTime:   {type: string, format: date-time}
        resultTime:       {type: string, format: date-time}
        result:
          description: |-
            OMS result — scalar, object, or any JSON. v0.1 does not
            constrain — typed results (Quantity / Category /
            TimeSeries) are a framework deferral; tracked in
            `docs/upstream-asks/`.

    FeatureCollection:
      type: object
      required: [type, features]
      description: |-
        RFC 7946 GeoJSON FeatureCollection. Stage 13: features now
        carry real Point geometry built from
        `processor/graph-index-spatial.SpatialResult.Lat/Lon/Alt`
        (framework v1.0.0-beta.75). Pre-Stage-13 emitted
        `geometry: null` + `X-CS-Geometry-Available: false`.
      properties:
        type: {type: string, enum: [FeatureCollection]}
        features:
          type: array
          items:
            type: object
            required: [type, geometry, properties]
            properties:
              type: {type: string, enum: [Feature]}
              id:   {type: string}
              geometry:
                type: object
                required: [type, coordinates]
                properties:
                  type:        {type: string, enum: [Point]}
                  coordinates:
                    type: array
                    minItems: 2
                    maxItems: 3
                    items: {type: number}
                description: |-
                  RFC 7946 Point geometry. 2D (lon, lat) when the
                  indexed entity has no vertical component; 3D
                  (lon, lat, alt) otherwise.
              properties:
                type: object

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: |-
            Human-readable. 5xx error bodies do not echo internal
            detail — the full error is logged server-side with a
            generated request ID for correlation.
