components:

  # --- Reusable parameters ---
  parameters:
    F:
      in: query
      name: f
      required: false
      schema:
        type: string
        enum: [json, geojson, sensorml, om, jsonld, yaml]
      description: |-
        OGC API Common Part 1 §7 short-name override for `Accept`.
        Maps to the same media types per-resource — see each path's
        `responses.content` for what's negotiable. `?f=` that doesn't
        map to the resource's supported set 406s rather than silently
        falling through to `Accept`.

    Limit:
      in: query
      name: limit
      required: false
      schema: {type: integer, minimum: 1}
      description: |-
        Page size. Defaulted and ceiling-capped per
        `cs-api.config.DefaultListLimit` / `MaxListLimit`. Out-of-range
        values 400.

    EntityID:
      in: path
      name: id
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9_.:-]+$'
      description: |-
        6-part SemStreams entity ID. NATS-token-safe characters only.

  # --- Reusable response shapes ---
  responses:
    BadRequest:
      description: Validation failure on a client-supplied value.
      content:
        application/json:
          schema: {$ref: "#/components/schemas/ErrorResponse"}
    NotFound:
      description: Entity not present (or present but wrong kind for this URL).
      content:
        application/json:
          schema: {$ref: "#/components/schemas/ErrorResponse"}
    NotAcceptable:
      description: |-
        No element of the family's negotiable set matches Accept (or
        `?f=` short-name). Body lists what the family supports.
      content:
        application/json:
          schema:
            type: object
            required: [error, supported]
            properties:
              error: {type: string, enum: ["not acceptable"]}
              supported:
                type: array
                items: {type: string}
    PayloadTooLarge:
      description: |-
        Request body exceeded the `MaxRequestBytes` middleware cap.
      content:
        application/json:
          schema: {$ref: "#/components/schemas/ErrorResponse"}
    UnsupportedMediaType:
      description: Content-Type not on the endpoint's accept set.
      headers:
        Accept-Post:
          schema: {type: string}
          description: Media types this endpoint accepts.
      content:
        application/json:
          schema: {$ref: "#/components/schemas/ErrorResponse"}
    ServiceUnavailable:
      description: |-
        Transient backend error — NATS unreachable, JetStream
        responder absent, request/reply timeout.
      content:
        application/json:
          schema: {$ref: "#/components/schemas/ErrorResponse"}
    NotImplemented:
      description: |-
        Endpoint is documented for spec-completeness but returns
        `501 Not Implemented` at v0.1. Path carries
        `x-not-implemented-at-v01: true` and an `x-cs-upstream-source`
        pointer.
      content:
        application/json:
          schema:
            type: object
            required: [error]
            properties:
              error: {type: string, enum: ["not implemented at v0.1"]}
              upstream_source: {type: string, format: uri-reference}

  # --- Reusable response headers ---
  headers:
    CsReconstructedLossy:
      description: |-
        `true` when the response body is reconstructed from triples and
        omits fields the framework's triple emitter does not preserve
        (inputs/outputs/parameters/keywords/connections/identifier
        metadata).
      schema: {type: boolean, enum: [true]}

  # --- Schemas ---
  schemas:

    LandingPage:
      type: object
      required: [links]
      properties:
        title:
          type: string
          description: Server title — operator-configured.
        description:
          type: string
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    ConformanceDeclaration:
      type: object
      required: [conformsTo]
      properties:
        conformsTo:
          type: array
          items:
            type: string
            format: uri
          description: |-
            URIs of the conformance classes this server claims to
            implement.

    Link:
      type: object
      required: [href, rel]
      properties:
        href:  {type: string, format: uri-reference}
        rel:   {type: string}
        type:  {type: string}
        title: {type: string}

    SystemCollection:
      type: object
      required: [type, numberMatched, numberReturned, items, links]
      properties:
        type:           {type: string, enum: [SystemCollection]}
        numberMatched:  {type: integer, minimum: 0}
        numberReturned: {type: integer, minimum: 0}
        truncated:      {type: boolean}
        items:
          type: array
          items: {$ref: "#/components/schemas/SystemRef"}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}
      description: |-
        Per CS API §7.13 / OGC API Common §7.14: array field is
        `items` (not `systems`). Stage 10 closed the spec gap.

    SystemRef:
      type: object
      required: [id, type]
      properties:
        id:    {type: string}
        type:  {type: string, enum: [System]}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    System:
      type: object
      required: [id, type, links]
      properties:
        id:            {type: string}
        type:          {type: string, enum: [System]}
        label:         {type: string}
        description:   {type: string}
        definition:    {type: string, format: uri}
        geometry:
          type: object
          description: |-
            GeoJSON-shaped position recovered from the SensorML
            `position` field. Typically `{type: "Point", coordinates:
            [lon, lat, alt?]}`. Stage 14 sister-side workaround for
            the framework's missing SensorML position-preservation;
            stored under the `cs-api.system.position` triple
            predicate. Absent when the source SensorML had no
            position. Retires when upstream `parser/sensorml` lands
            a Position field on AbstractProcess + emits a triple
            natively.
        hosts:
          type: array
          items: {type: string}
        hostedBy:      {type: string}
        usedProcedure: {type: string}
        attachedTo:    {type: string}
        identifiers:   {type: array, items: {}}
        capabilities:  {type: array, items: {}}
        properties:    {type: array, items: {}}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}
      description: |-
        v0.1 JSON subset reconstructed from triples. Lossy fields
        documented via `X-CS-Reconstructed-Lossy: true`. Stage 14
        adds `geometry` via sister-side position-preservation
        workaround.

    SystemFeature:
      type: object
      required: [type, properties]
      properties:
        type:     {type: string, enum: [Feature]}
        id:       {type: string, description: Optional client-supplied 6-part SemStreams ID. When absent, the server mints from `properties.uid`.}
        geometry: {type: object, nullable: true, description: GeoJSON geometry — stored on the entity for /areas spatial recovery.}
        properties:
          type: object
          required: [uid]
          properties:
            uid:         {type: string, description: SensorML uniqueId — feeds the 6-part entity ID mint.}
            name:        {type: string}
            description: {type: string}
      description: |-
        Stage 16 — CS API §7.6 GeoJSON Feature body for POST and PUT
        on /systems. Distinct from the read-side `System` resource:
        write-side accepts the spec's Feature shape; read-side
        returns the §7.2 JSON subset.

    DatastreamCollection:
      type: object
      required: [type, numberMatched, numberReturned, items, links]
      properties:
        type:           {type: string, enum: [DatastreamCollection]}
        numberMatched:  {type: integer, minimum: 0}
        numberReturned: {type: integer, minimum: 0}
        truncated:      {type: boolean}
        items:
          type: array
          items: {$ref: "#/components/schemas/DatastreamRef"}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    DatastreamRef:
      type: object
      required: [id, type]
      properties:
        id:    {type: string}
        type:  {type: string, enum: [Datastream]}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    Datastream:
      type: object
      required: [id, type]
      properties:
        id:               {type: string}
        type:             {type: string, enum: [Datastream]}
        name:             {type: string}
        description:      {type: string}
        system:           {type: string, description: 6-part SemStreams system ID.}
        observedProperty: {type: string, format: uri}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}

    DatastreamCreate:
      type: object
      required: [name, system, observedProperty]
      properties:
        id:               {type: string, description: Optional client-supplied 6-part ID; minted otherwise.}
        name:             {type: string}
        description:      {type: string}
        system:           {type: string, description: 6-part SemStreams system ID (strict).}
        observedProperty: {type: string, format: uri}

    ObservationCollection:
      type: object
      required: [type, numberMatched, numberReturned, items, links]
      properties:
        type:           {type: string, enum: [ObservationCollection]}
        numberMatched:  {type: integer, minimum: 0}
        numberReturned: {type: integer, minimum: 0}
        truncated:      {type: boolean}
        items:
          type: array
          items: {$ref: "#/components/schemas/Observation"}
        links:
          type: array
          items: {$ref: "#/components/schemas/Link"}
      description: |-
        `truncated` is a v0.1 heuristic — see
        `gateway/cs-api/observations_get.go` `observationCollection`
        doc comment for failure modes. Follow-up replaces with
        `consumer.Info().NumPending`.

    Observation:
      type: object
      required: [procedure, observedProperty, resultTime]
      properties:
        id:               {type: string}
        procedure:        {type: string, format: uri}
        observedProperty: {type: string, format: uri}
        featureOfInterest: {type: string}
        phenomenonTime:   {type: string, format: date-time}
        resultTime:       {type: string, format: date-time}
        result:
          description: |-
            OMS result — scalar, object, or any JSON. v0.1 does not
            constrain — typed results (Quantity / Category /
            TimeSeries) are a framework deferral; tracked in
            `docs/upstream-asks/`.

    FeatureCollection:
      type: object
      required: [type, features]
      description: |-
        RFC 7946 GeoJSON FeatureCollection. Stage 13: features now
        carry real Point geometry built from
        `processor/graph-index-spatial.SpatialResult.Lat/Lon/Alt`
        (framework v1.0.0-beta.75). Pre-Stage-13 emitted
        `geometry: null` + `X-CS-Geometry-Available: false`.
      properties:
        type: {type: string, enum: [FeatureCollection]}
        features:
          type: array
          items:
            type: object
            required: [type, geometry, properties]
            properties:
              type: {type: string, enum: [Feature]}
              id:   {type: string}
              geometry:
                type: object
                required: [type, coordinates]
                properties:
                  type:        {type: string, enum: [Point]}
                  coordinates:
                    type: array
                    minItems: 2
                    maxItems: 3
                    items: {type: number}
                description: |-
                  RFC 7946 Point geometry. 2D (lon, lat) when the
                  indexed entity has no vertical component; 3D
                  (lon, lat, alt) otherwise.
              properties:
                type: object

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: |-
            Human-readable. 5xx error bodies do not echo internal
            detail — the full error is logged server-side with a
            generated request ID for correlation.
