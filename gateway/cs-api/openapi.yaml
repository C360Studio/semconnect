openapi: 3.0.3
info:
  title: semconnect — OGC API Connected Systems (CS API) v0.1
  version: 0.1.0
  description: |-
    OAS3 contract for the cs-api gateway shipped by
    [semconnect](https://github.com/C360Studio/semconnect).

    cs-api exposes a subset of [OGC API Connected Systems](https://docs.ogc.org/DRAFTS/23-001r0.html)
    over the [semstreams](https://github.com/C360Studio/semstreams)
    framework primitives. v0.1 ships the endpoints listed below as
    "implemented". Endpoints carrying `x-not-implemented-at-v01: true`
    are documented here for spec-completeness and roadmap visibility but
    return `501 Not Implemented` today.

    **Honest deferral signals.** Several endpoints return data that is
    intentionally lossy or shape-truncated relative to the upstream
    spec. cs-api signals these via response headers:

    - `X-CS-Reconstructed-Lossy: true` on `GET /systems/{id}` — the
      SensorML / JSON-LD reconstruction from triples drops
      inputs/outputs/parameters/keywords/connections/identifier
      metadata that the framework's triple emitter does not preserve.
      Clients drilling into nested System children get skeleton refs.
    - `X-CS-Items-Count: <N>` on `GET /datastreams/{id}/observations`
      with `Accept: application/om+json` — count of items in the bare
      OMS array response (the JSON wrapper already carries
      `numberReturned`).

    **Auth posture.** Anonymous-by-default at v0.1. Optional
    `X-Forwarded-User` / `X-Forwarded-Email` headers from a trusted
    reverse proxy are recorded on the audit trail but NOT
    authorization-checked. No verification at this maturity level.

    **Source.** Hand-authored to reflect cs-api's actual behavior.
    Adapted from the upstream OGC OAS3 source at
    `opengeospatial/ogcapi-connected-systems@3fd86c7` — see
    `api/upstream/NOTICE-OF-MODIFICATIONS.md` for license + attribution.
  contact:
    name: c360 / semconnect
    url: https://github.com/C360Studio/semconnect
  license:
    name: Adapted from OGC OAS (OGC License)
    url: https://github.com/C360Studio/semconnect/blob/main/api/upstream/LICENSE-OGC.txt

servers:
  - url: /
    description: |-
      Same-origin. cs-api-server binds whatever address its config
      specifies (default `:8080`); the OAS is served at `/api`.
      Operators behind reverse proxies should override Server URL
      out-of-band rather than hard-coding it here.

tags:
  - name: Capabilities
    description: Landing page, conformance declaration, OAS definition, health.
  - name: Systems
    description: |-
      `System` resources — sensors, platforms, processing nodes
      (anything that can produce data or receive commands). CS API §7.
  - name: Datastreams
    description: |-
      `Datastream` resources — observation channels emitted by a
      System. CS API §10.
  - name: Observations
    description: |-
      `Observation` resources — individual measurements on a
      Datastream. CS API Part 2 §11.
  - name: Areas
    description: |-
      Spatial filter — returns Systems whose location intersects a
      bbox or polygon. cs-api-specific endpoint shaped on OGC GeoJSON
      conformance class.
  - name: NotImplementedAtV01
    description: |-
      Vendored from the upstream OGC OAS for roadmap visibility;
      returns `501 Not Implemented` at v0.1. Each carries
      `x-not-implemented-at-v01: true` and a pointer to the source
      under `api/upstream/`. Implementation tracked per stage.

security:
  - {}  # anonymous-by-default at v0.1 — middleware-body swap turns this on

paths:
  # ============================================================
  # Capabilities (Common Part 1 Core + JSON + OAS30)
  # ============================================================
  /:
    get:
      operationId: getLandingPage
      summary: Landing page
      description: |-
        Returns the entry-point document listing links to the
        conformance declaration, the OpenAPI service definition,
        and the top-level resource collections.
      tags: [Capabilities]
      parameters:
        - $ref: "#/components/parameters/F"
      responses:
        "200":
          description: Landing page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandingPage"
        "406": {$ref: "#/components/responses/NotAcceptable"}
    head:
      operationId: headLandingPage
      summary: Landing page (HEAD).
      tags: [Capabilities]
      responses:
        "200":
          description: OK (no body).

  /api:
    get:
      operationId: getApi
      summary: OpenAPI 3.0 service definition.
      description: |-
        This document. Returned as JSON by default; `?f=yaml` or
        `Accept: application/vnd.oai.openapi;version=3.0` returns
        YAML. Backing file is `api/openapi.yaml` in the repo.
      tags: [Capabilities]
      parameters:
        - $ref: "#/components/parameters/F"
      responses:
        "200":
          description: OAS3 service definition.
          content:
            application/vnd.oai.openapi+json;version=3.0:
              schema:
                type: object
                description: Self-reference — the OpenAPI 3.0 schema.
            application/json:
              schema:
                type: object
                description: |-
                  Same JSON serialization as `application/vnd.oai.openapi+json`.
                  Honored so curl-without-Accept (the default `Accept: */*`)
                  lands on JSON instead of 406.
            application/vnd.oai.openapi;version=3.0:
              schema:
                type: string
                description: Raw YAML body.
        "406": {$ref: "#/components/responses/NotAcceptable"}
    head:
      operationId: headApi
      summary: OAS definition (HEAD).
      tags: [Capabilities]
      responses:
        "200": {description: OK (no body)}

  /conformance:
    get:
      operationId: getConformance
      summary: Conformance declaration.
      description: |-
        Lists the conformance classes the server claims. v0.1 claims:

        - OGC Common Part 1 Core, JSON, OAS30
        - CS API Part 1 Core, JSON, GeoJSON, SensorML, JSON-LD
        - CS API Part 2 OMS encoding (observations)

        Full claim set authoritative in `gateway/cs-api/conformance.go`.
      tags: [Capabilities]
      parameters:
        - $ref: "#/components/parameters/F"
      responses:
        "200":
          description: Conformance declaration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConformanceDeclaration"
        "406": {$ref: "#/components/responses/NotAcceptable"}
    head:
      operationId: headConformance
      tags: [Capabilities]
      responses:
        "200": {description: OK (no body)}

  /health:
    get:
      operationId: getHealth
      summary: Operator health probe.
      description: |-
        Returns `200 {"status":"ok"}` when the gateway can reach NATS,
        `503` otherwise. Intended for liveness/readiness probes; not
        part of the OGC CS API standard surface.
      tags: [Capabilities]
      responses:
        "200":
          description: Healthy.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: {type: string, enum: [ok]}
        "503":
          description: Degraded (NATS unreachable or errs threshold tripped).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    head:
      operationId: headHealth
      tags: [Capabilities]
      responses:
        "200": {description: OK (no body)}
        "503": {description: Degraded}

  # ============================================================
  # Systems (CS API §7)
  # ============================================================
  /systems:
    get:
      operationId: getSystems
      summary: List systems.
      description: |-
        Returns a `SystemCollection` of `System` entities (default,
        `application/json`) or an RFC 7946 `FeatureCollection` with
        per-system geometry recovered from the `cs-api.system.position`
        triple (`application/geo+json`, Stage 15).

        No SensorML `SystemCollection` wrapper exists; SensorML is
        per-item via `GET /systems/{id}`.

        The GeoJSON path is N+1 (entity-query per item) — at v0.1 list
        sizes this is acceptable; future framework optimization either
        extends the predicate index to carry entity properties OR adds
        a batched entity-query subject.
      tags: [Systems]
      parameters:
        - $ref: "#/components/parameters/F"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: |-
            SystemCollection (JSON) or FeatureCollection (GeoJSON).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemCollection"
            application/geo+json:
              schema:
                $ref: "#/components/schemas/FeatureCollection"
        "400": {$ref: "#/components/responses/BadRequest"}
        "406": {$ref: "#/components/responses/NotAcceptable"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
    head:
      operationId: headSystems
      tags: [Systems]
      responses:
        "200": {description: OK (no body)}
    post:
      operationId: createSystem
      summary: Create a system (CS API §7.6 create-replace-delete).
      description: |-
        Accepts three request media types, selected by `Content-Type`:

        - `application/sensorml+json` (preferred) — full SensorML
          Process; entity ID minted from `uniqueId` (UUID fallback).
        - `application/sml+json` — alias for the above per
          CS API §7.6 media type registration.
        - `application/json` or `application/geo+json` — GeoJSON
          Feature shape (`SystemFeature` schema); entity ID minted
          from `properties.uid` (UUID fallback).

        Returns 201 with a `Location` header.
      tags: [Systems]
      requestBody:
        required: true
        content:
          application/sensorml+json:
            schema:
              type: object
              description: |-
                SensorML PhysicalSystem / PhysicalComponent /
                SimpleProcess / AggregateProcess JSON. Full schema
                in `api/upstream/part1/schemas/sensorml/`.
          application/sml+json:
            schema:
              type: object
              description: Alias for `application/sensorml+json`.
          application/json:
            schema: {$ref: "#/components/schemas/SystemFeature"}
          application/geo+json:
            schema: {$ref: "#/components/schemas/SystemFeature"}
      responses:
        "201":
          description: Created.
          headers:
            Location:
              schema: {type: string, format: uri-reference}
              description: Path to the newly-created system resource.
          content:
            application/json:
              schema:
                type: object
                required: [status, id, type]
                properties:
                  status: {type: string, enum: [created]}
                  id:    {type: string, description: 6-part SemStreams entity ID.}
                  type:  {type: string, enum: [System]}
        "400": {$ref: "#/components/responses/BadRequest"}
        "413": {$ref: "#/components/responses/PayloadTooLarge"}
        "415": {$ref: "#/components/responses/UnsupportedMediaType"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
    options:
      operationId: optionsSystems
      summary: Advertise allowed methods on /systems.
      description: |-
        Returns 204 with an `Allow` header. Lets the ETS confirm
        write-side readiness without exercising POST.
      tags: [Systems]
      responses:
        "204":
          description: No Content.
          headers:
            Allow:
              schema: {type: string}
              description: '`GET, HEAD, POST, OPTIONS`'

  /systems/{id}:
    parameters:
      - $ref: "#/components/parameters/EntityID"
    get:
      operationId: getSystem
      summary: Fetch a system by ID.
      description: |-
        Returns the System resource in one of three encodings:

        - `application/json` — CS API §7.2 JSON subset (lossy, see header).
        - `application/sensorml+json` — SensorML reconstruction from
          triples (lossy).
        - `application/ld+json` — JSON-LD via the framework's RDF
          serializer.

        All three honestly signal lossy reconstruction via
        `X-CS-Reconstructed-Lossy: true`.
      tags: [Systems]
      parameters:
        - $ref: "#/components/parameters/F"
      responses:
        "200":
          description: System resource.
          headers:
            X-CS-Reconstructed-Lossy:
              $ref: "#/components/headers/CsReconstructedLossy"
          content:
            application/json:
              schema: {$ref: "#/components/schemas/System"}
            application/sensorml+json:
              schema:
                type: object
                description: |-
                  Reconstructed SensorML PhysicalSystem / Sensor /
                  Procedure. Fields dropped by the triple-emitter
                  (inputs/outputs/parameters/keywords/connections) are
                  absent — see `X-CS-Reconstructed-Lossy` header.
            application/ld+json:
              schema:
                type: object
                description: JSON-LD with SOSA / SSN / SKOS context.
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "406": {$ref: "#/components/responses/NotAcceptable"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
    head:
      operationId: headSystem
      tags: [Systems]
      responses:
        "200": {description: OK (no body)}
        "404": {description: Not Found}
    put:
      operationId: replaceSystem
      summary: Replace a system (CS API §7.6 create-replace-delete).
      description: |-
        Replace-or-upsert semantics: existing triples for the entity
        are removed, then the request body's triples are written. If
        the entity does not exist, the body's triples are written
        fresh (CS API §7.6 standard PUT-as-upsert).

        The body's `properties.uid` must mint to the same entity ID
        as the path `{id}` — mismatch yields 400 *before* any
        destructive operation.

        Body media type is `application/json` or
        `application/geo+json` (GeoJSON Feature shape). SensorML is
        intentionally not accepted on PUT — the lossy triple
        round-trip would mismatch the read-back shape and surprise
        clients.
      tags: [Systems]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/SystemFeature"}
          application/geo+json:
            schema: {$ref: "#/components/schemas/SystemFeature"}
      responses:
        "204":
          description: System replaced or upserted.
          headers:
            X-CS-Attempted-ID:
              schema: {type: string}
              description: Echoes the entity ID — present on every response so clients can correlate.
            X-CS-Partial-Delete:
              schema: {type: string, enum: ["true"]}
              description: |-
                Present (with value `true`) on a 5xx if the destructive
                half of replace succeeded but the add-batch failed —
                the entity is in a partial/erased state and the client
                must retry the PUT to recover.
        "400": {$ref: "#/components/responses/BadRequest"}
        "413": {$ref: "#/components/responses/PayloadTooLarge"}
        "415": {$ref: "#/components/responses/UnsupportedMediaType"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
    delete:
      operationId: deleteSystem
      summary: Delete a system (CS API §7.6 create-replace-delete).
      description: |-
        Idempotent: a delete against a non-existent ID still returns
        204. Removes every triple associated with the entity. A
        successful 204 means every per-predicate remove succeeded;
        a 5xx with `X-CS-Partial-Delete: true` means the loop failed
        mid-fan-out and the entity is in an intermediate state — the
        client should retry until 204.
      tags: [Systems]
      responses:
        "204": {description: System deleted (or never existed).}
        "400": {$ref: "#/components/responses/BadRequest"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
    options:
      operationId: optionsSystem
      summary: Advertise allowed methods on /systems/{id}.
      description: |-
        Returns 204 with an `Allow` header listing the methods the
        item endpoint supports. PATCH is intentionally absent —
        cs-api does not implement PATCH at v0.1 (no `conf/update`
        claim either).
      tags: [Systems]
      responses:
        "204":
          description: No Content.
          headers:
            Allow:
              schema: {type: string}
              description: '`GET, HEAD, PUT, DELETE, OPTIONS`'

  # ============================================================
  # Datastreams (CS API §10)
  # ============================================================
  /datastreams:
    get:
      operationId: getDatastreams
      summary: List datastreams.
      description: |-
        Returns a `DatastreamCollection`. JSON-only at v0.1. Stage 13
        retired the `X-CS-Datastream-Subset` header — framework
        v1.0.0-beta.75 ships the native CS API datastream vocabulary
        (`vocabulary/csapi.Datastream`) so the subset disclaimer no
        longer applies.
      tags: [Datastreams]
      parameters:
        - $ref: "#/components/parameters/F"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: DatastreamCollection.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/DatastreamCollection"}
        "400": {$ref: "#/components/responses/BadRequest"}
        "406": {$ref: "#/components/responses/NotAcceptable"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
    head:
      operationId: headDatastreams
      tags: [Datastreams]
      responses:
        "200": {description: OK (no body)}
    post:
      operationId: createDatastream
      summary: Create a datastream referencing a system + observed property.
      description: |-
        Accepts CS API §10 Datastream JSON. Validates the `system`
        reference (6-part SemStreams shape strict) and
        `observedProperty` (non-empty IRI). Honors a client-supplied
        6-part `id` verbatim — otherwise mints from
        `cfg.DatastreamIDPrefix`.
      tags: [Datastreams]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/DatastreamCreate"}
      responses:
        "201":
          description: Created.
          headers:
            Location:
              schema: {type: string, format: uri-reference}
          content:
            application/json:
              schema:
                type: object
                required: [status, id, type]
                properties:
                  status: {type: string, enum: [created]}
                  id:    {type: string}
                  type:  {type: string, enum: [Datastream]}
        "400": {$ref: "#/components/responses/BadRequest"}
        "413": {$ref: "#/components/responses/PayloadTooLarge"}
        "415": {$ref: "#/components/responses/UnsupportedMediaType"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
    options:
      operationId: optionsDatastreams
      summary: Advertise allowed methods on /datastreams.
      description: |-
        Returns 204 with an `Allow` header. Lets the ETS confirm
        write-side readiness without exercising POST.
      tags: [Datastreams]
      responses:
        "204":
          description: No Content.
          headers:
            Allow:
              schema: {type: string}
              description: '`GET, HEAD, POST, OPTIONS`'

  /datastreams/{id}:
    parameters:
      - $ref: "#/components/parameters/EntityID"
    get:
      operationId: getDatastream
      summary: Fetch a datastream by ID.
      tags: [Datastreams]
      parameters:
        - $ref: "#/components/parameters/F"
      responses:
        "200":
          description: Datastream resource.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Datastream"}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "406": {$ref: "#/components/responses/NotAcceptable"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
    head:
      operationId: headDatastream
      tags: [Datastreams]
      responses:
        "200": {description: OK (no body)}
        "404": {description: Not Found}
    put:
      operationId: replaceDatastream
      summary: Replace a datastream (CS API §10.6 create-replace-delete).
      description: |-
        Replace-or-upsert semantics: existing triples for the entity
        are removed, then the request body's triples are written. If
        the entity does not exist, the body's triples are written
        fresh (CS API §10.6 standard PUT-as-upsert).

        Body media type is `application/json` only — the CS API §10
        Datastream JSON shape. Required fields (`system`,
        `observedProperty`) are validated. If the body carries an
        `id` field it must match the path `{id}` — mismatch yields
        400 *before* any destructive operation.
      tags: [Datastreams]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/DatastreamCreate"}
      responses:
        "204":
          description: Datastream replaced or upserted.
          headers:
            X-CS-Attempted-ID:
              schema: {type: string}
            X-CS-Partial-Delete:
              schema: {type: string, enum: ["true"]}
              description: |-
                Present (with value `true`) on a 5xx if the destructive
                half succeeded but the add-batch failed — the entity is
                in a partial/erased state and the client must retry.
        "400": {$ref: "#/components/responses/BadRequest"}
        "413": {$ref: "#/components/responses/PayloadTooLarge"}
        "415": {$ref: "#/components/responses/UnsupportedMediaType"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
    delete:
      operationId: deleteDatastream
      summary: Delete a datastream (CS API §10.6 create-replace-delete).
      description: |-
        Idempotent: a delete against a non-existent ID still returns
        204. Removes every triple associated with the entity. A 5xx
        with `X-CS-Partial-Delete: true` indicates the fan-out failed
        mid-loop — client should retry.

        **Observations are NOT cascade-deleted at v0.1.** Observations
        published via POST /datastreams/{id}/observations live in the
        `cs-api.observations.{id}` JetStream, which is operator-managed
        and outside the triple-graph delete loop. Reading
        /datastreams/{id}/observations after DELETE returns 200 with
        whatever observations remain on the stream until the operator
        (or a future stage) purges them.
      tags: [Datastreams]
      responses:
        "204": {description: Datastream deleted (or never existed).}
        "400": {$ref: "#/components/responses/BadRequest"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
    options:
      operationId: optionsDatastream
      summary: Advertise allowed methods on /datastreams/{id}.
      description: |-
        Returns 204 with an `Allow` header. PATCH intentionally
        absent — cs-api does not implement PATCH at v0.1.
      tags: [Datastreams]
      responses:
        "204":
          description: No Content.
          headers:
            Allow:
              schema: {type: string}
              description: '`GET, HEAD, PUT, DELETE, OPTIONS`'

  /datastreams/{datastreamID}/observations:
    parameters:
      - in: path
        name: datastreamID
        required: true
        schema: {type: string}
        description: 6-part SemStreams datastream ID.
    get:
      operationId: getObservations
      summary: List observations on a datastream.
      description: |-
        Returns observations in stream-sequence order via a one-shot
        JetStream OrderedConsumer filtered on
        `cs-api.observations.{datastreamID}`. Paging via opaque
        `?after=<stream-seq>` cursor; `next` link minted on the wrapper
        when the page fills.

        Two output shapes by content negotiation:

        - `application/json` — CS API §11.3 `ObservationCollection`
          wrapper (`items[]`, `numberReturned`, `truncated`, `links`).
        - `application/om+json` — bare JSON array of OMS observation
          payloads. Symmetric with the POST shape; OMS-native clients
          consume directly. Count is signalled via `X-CS-Items-Count`.
      tags: [Observations]
      parameters:
        - $ref: "#/components/parameters/F"
        - $ref: "#/components/parameters/Limit"
        - in: query
          name: after
          required: false
          schema: {type: integer, format: int64, minimum: 1}
          description: |-
            Opaque cursor — a JetStream stream sequence number. Returns
            observations strictly after this sequence (JetStream's
            inclusive `OptStartSeq` is bumped by 1 server-side).
      responses:
        "200":
          description: ObservationCollection (JSON) or bare OMS array.
          headers:
            X-CS-Items-Count:
              description: |-
                Count of items in the bare OMS array shape — set on
                `Accept: application/om+json` responses only. The JSON
                wrapper carries the same count in `numberReturned`.
              schema: {type: integer, minimum: 0}
          content:
            application/json:
              schema: {$ref: "#/components/schemas/ObservationCollection"}
            application/om+json:
              schema:
                type: array
                items: {$ref: "#/components/schemas/Observation"}
        "400": {$ref: "#/components/responses/BadRequest"}
        "406": {$ref: "#/components/responses/NotAcceptable"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
    head:
      operationId: headObservations
      tags: [Observations]
      responses:
        "200": {description: OK (no body)}
    post:
      operationId: createObservation
      summary: Publish an OMS observation.
      description: |-
        Accepts `application/om+json` — a single OMS Observation
        document. Wraps in a `message.BaseMessage` envelope and
        publishes to JetStream subject
        `cs-api.observations.{datastreamID}` with audit + W3C trace
        headers. Server mints `id` if absent.
      tags: [Observations]
      requestBody:
        required: true
        content:
          application/om+json:
            schema: {$ref: "#/components/schemas/Observation"}
      responses:
        "201":
          description: Created.
          headers:
            Location:
              schema: {type: string, format: uri-reference}
              description: Path to the new observation (id is server-minted if absent).
        "400": {$ref: "#/components/responses/BadRequest"}
        "413": {$ref: "#/components/responses/PayloadTooLarge"}
        "415": {$ref: "#/components/responses/UnsupportedMediaType"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}

  # ============================================================
  # Spatial (cs-api shape on OGC GeoJSON conformance class)
  # ============================================================
  /areas:
    get:
      operationId: getAreas
      summary: Spatial filter for systems.
      description: |-
        Filter systems by spatial extent. Exactly one of `bbox` or
        `polygon` is required. Returns a GeoJSON `FeatureCollection`.

        Features carry real Point geometry (Stage 13). Framework
        v1.0.0-beta.75 added Lat/Lon/Alt echo to `SpatialResult`,
        retiring the pre-Stage-13 `X-CS-Geometry-Available: false`
        deferral header. Alt is omitted when the indexed entity has
        no vertical component.
      tags: [Areas]
      parameters:
        - $ref: "#/components/parameters/F"
        - in: query
          name: bbox
          required: false
          schema:
            type: string
            pattern: '^-?[\d.]+,-?[\d.]+,-?[\d.]+,-?[\d.]+$'
          description: |-
            CSV `minLon,minLat,maxLon,maxLat` per OGC bbox convention.
            Exclusive with `polygon`.
        - in: query
          name: polygon
          required: false
          schema: {type: string}
          description: |-
            GeoJSON Polygon JSON literal. Exclusive with `bbox`.
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: GeoJSON FeatureCollection.
          content:
            application/geo+json:
              schema: {$ref: "#/components/schemas/FeatureCollection"}
            application/json:
              schema: {$ref: "#/components/schemas/FeatureCollection"}
        "400": {$ref: "#/components/responses/BadRequest"}
        "406": {$ref: "#/components/responses/NotAcceptable"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
    head:
      operationId: headAreas
      tags: [Areas]
      responses:
        "200": {description: OK (no body)}

  # ============================================================
  # Deferred to follow-up stages — vendored from upstream OGC OAS
