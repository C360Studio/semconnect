# Stage 9 conformance harness — NATS server config.
#
# We use a config file (not CLI flags) because nats-server 2.10 exposes
# JetStream limits only via config-file keys, not flags. Auto-sizing on
# Docker for Mac is unreliable under image-cache pressure and reports
# "insufficient storage resources" (err_code=10047) when the framework
# tries to create its baseline streams (LOGS, FLOWS, etc.).

http_port: 8222

jetstream {
    store_dir: "/data"
    max_file_store: 10GB
    max_memory_store: 1GB
}
