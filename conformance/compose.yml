# Stage 6 conformance harness — bootstraps NATS + cs-api-server + the
# Botts CS API ETS (TeamEngine 5.6.1) on a shared docker network.
#
# Run via `conformance/run.sh` (which loads .ets-pin, clones the pinned
# Botts ETS into ./.vendor/ets, then invokes this compose file). Running
# `docker compose -f conformance/compose.yml up` directly will fail
# because `./.vendor/ets` won't exist — that is intentional.

name: semconnect-conformance

services:
  nats:
    image: nats:2.10-alpine
    # Stage 9 — config file (not CLI flags) is required to set JetStream
    # max_file_store / max_memory_store. nats-server 2.10's CLI exposes
    # only -js / -sd / -m. Auto-sizing on a Docker-for-Mac VM under
    # image-cache pressure can compute a limit too small for the
    # framework's baseline streams, surfacing as
    # `nats: API error: code=500 err_code=10047 description=insufficient
    # storage resources available` at stream-create time. Pinning 10GB
    # gives ample headroom without competing with the host.
    command:
      - "-c"
      - "/etc/nats/nats.conf"
    volumes:
      - nats-data:/data
      - ./nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      # nats:2.10-alpine includes busybox wget; -m 8222 enables the
      # /healthz monitoring endpoint.
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    # NATS host ports exposed for human debug only — the harness reaches
    # NATS via the compose network. Override the host-side ports via env
    # when 4222/8222 are busy on the dev machine.
    ports:
      - "${NATS_HOST_PORT:-4222}:4222"
      - "${NATS_MON_HOST_PORT:-8222}:8222"

  # Stage 9 — slim graph-only semstreams instance. Responds to the
  # NATS subjects cs-api-server publishes to: graph.mutation.triple.*
  # (writes), graph.index.query.predicate (collection reads),
  # graph.query.entity (single-entity reads), graph.spatial.query.*
  # (GET /areas). Without this service every cs-api-server read or
  # write 503s with nats.ErrNoResponders.
  #
  # Built from the framework's own production Dockerfile against the
  # pin in .ets-pin (SEMSTREAMS_GIT_URL + SEMSTREAMS_COMMIT). run.sh
  # clones the framework into ./.vendor/semstreams/ before bringing
  # the stack up — running `docker compose up` directly will fail
  # because that directory won't exist (intentional).
  semstreams-backend:
    build:
      context: ./.vendor/semstreams
      dockerfile: docker/Dockerfile
      target: production
      cache_from:
        - type=gha,scope=semstreams-backend
      cache_to:
        - type=gha,mode=max,scope=semstreams-backend
    depends_on:
      nats:
        condition: service_healthy
    command:
      - "-config"
      - "/etc/semstreams/config.json"
      - "-debug-port"
      - "0"
    volumes:
      - ./compose.semstreams.config.json:/etc/semstreams/config.json:ro
    healthcheck:
      # `/health` is served by service-manager, on the port set in
      # compose.semstreams.config.json (8090). The framework's
      # `-health-port` flag is declared but never wired in
      # v1.0.0-beta.73 (cmd/semstreams/flags.go vs main.go — flag
      # parsed, value unused), so /health does NOT bind on it.
      # Don't be misled by the help text.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/health"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 30s
    expose:
      - "8090"
      # 9090 — the framework's Prometheus /metrics endpoint. `cmd/semstreams`
      # auto-injects a `metrics` service at boot (ensureMetricsConfig, port
      # 9090) even when the config file omits it, so this endpoint is always
      # live. The Stage 56 foreign-edge bake in run.sh scrapes
      # semstreams_graph_ingest_foreign_edge_unclaimed_total here. (Inter-service
      # traffic on the compose network ignores `expose`, which is informational —
      # this documents the dependency for the human reading the harness.)
      - "9090"

  cs-api-server:
    build:
      context: ..
      dockerfile: Dockerfile
      # GHA's cache backend (type=gha) is plumbed through buildx when this
      # compose is invoked under GHA. Locally these directives are inert
      # because no GHA token is present; buildx falls back to the daemon
      # cache. See .github/workflows/conformance.yml.
      cache_from:
        - type=gha,scope=cs-api-server
      cache_to:
        - type=gha,mode=max,scope=cs-api-server
    depends_on:
      nats:
        condition: service_healthy
      # Wait for semstreams-backend to be healthy — otherwise the first
      # cs-api-server request that hits graph.* races the backend's
      # subscribe and 503s. The backend healthcheck below gates this.
      semstreams-backend:
        condition: service_healthy
    # cs-api-server reads --config but defaults are sane: NATS at
    # nats://localhost:4222, bind :8080. Override NATS_URL via env-injected
    # config or accept that cs-api-server's defaults assume localhost; on
    # docker we must pass --config pointing at a file. We mount one.
    command:
      - "-config"
      - "/etc/cs-api-server/config.json"
    volumes:
      # Bind-mounted config: host-side file is world-readable (644 default);
      # distroless `nonroot` (uid 65532) reads via virtiofs / host-bind
      # ownership translation. If you bring this up on a hardened Linux
      # host with umask 077, chmod 644 the config before `compose up`.
      - ./compose.cs-api.config.json:/etc/cs-api-server/config.json:ro
    healthcheck:
      # distroless/static has no shell. cs-api-server exposes /health on the
      # configured bind address; we probe via docker's HEALTHCHECK from
      # outside via depends_on instead. Set a no-op healthcheck to avoid the
      # CMD-SHELL requirement; readiness gates run.sh side via curl.
      disable: true
    # No host port mapping — the harness reaches cs-api-server only from
    # inside the compose network via service name. Avoiding the host
    # bind keeps the harness portable to dev machines that already run
    # a server on :8080. Override at the user's discretion.
    expose:
      - "8080"

  teamengine:
    # build.context is overridden by run.sh to the git URL pin from .ets-pin
    # via a generated compose.override.yml. Until run.sh stages that file,
    # this placeholder path will fail — that is intentional: do not run
    # compose directly.
    build:
      context: ./.vendor/ets
      cache_from:
        - type=gha,scope=ets-teamengine
      cache_to:
        - type=gha,mode=max,scope=ets-teamengine
    # depends_on uses service_started rather than service_healthy because
    # cs-api-server's healthcheck is `disable: true` (distroless has no
    # shell). run.sh's step 4 closes the gap with an IUT-reach probe
    # before invoking the suite. start_period: 90s on the teamengine
    # healthcheck below absorbs the slop.
    depends_on:
      cs-api-server:
        condition: service_started
    # Host port mapping is what run.sh / the human curl-to. Override via
    # TE_HOST_PORT when 8081 is busy locally.
    ports:
      - "${TE_HOST_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost:8080/teamengine/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 90s

volumes:
  nats-data:
